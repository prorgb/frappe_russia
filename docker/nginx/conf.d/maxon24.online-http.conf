# Только порт 80: ACME и прокси или редирект (см. conf.d/includes/maxon24.online-http-mode.inc).

server {
    listen 80;
    server_name maxon24.online www.maxon24.online erp.maxon24.online;

    # Для ACME-челленджа certbot (webroot).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    include /etc/nginx/conf.d/includes/maxon24.online-http-mode.inc;
}
